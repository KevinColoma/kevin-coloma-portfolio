name: Compilar CV

on:
  push:
    branches: [master]
    paths:
      - 'public/cv.tex'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-lang-spanish

      - name: Compilar CV
        working-directory: public
        run: |
          pdflatex -interaction=nonstopmode cv.tex
          pdflatex -interaction=nonstopmode cv.tex

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/cv.pdf
          git diff --staged --quiet || git commit -m "auto: compilar CV [skip ci]"
          git push
